<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Parte</title>
    <link rel="stylesheet" href="css/cadpartes.css">
</head>
<body>

    <!-- MENU -->
    <div class="menu">
        <h2>Contratos</h2>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="contratos.html">Contratos</a></li>
            <li><a href="partes.html">Partes</a></li>
            <li><a href="relatorios.html">Relatórios</a></li>
            <li><a href="config.html">Configurações</a></li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <h1>Nova Parte Contratante</h1>

        <form class="formulario">

            <input type="text" placeholder="Nome">

            <select>
                <option>Tipo</option>
                <option>Fornecedor</option>
                <option>Cliente</option>
                <option>Parceiro</option>
            </select>

            <input type="text" placeholder="CPF/CNPJ">

            <input type="text" placeholder="Contato">

            <input type="email" placeholder="Email">

            <input type="text" placeholder="Telefone">

            <textarea placeholder="Endereço"></textarea>

            <button class="salvar">Salvar Parte</button>

        </form>

    </div>

</body>
</html>
