<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Editar Parte</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='editarparte.css') }}">

</head>

<body>

    <!-- MENU -->
    <div class="menu">

        <h2>Contratos</h2>

        <ul>

            <li>
                <a href="/dashboard">Dashboard</a>
            </li>

            <li>
                <a href="/">Contratos</a>
            </li>

            <li>
                <a href="/partes">Partes</a>
            </li>

            <li>
                <a href="/relatorios">Relatórios</a>
            </li>

            <li>
                <a href="/config">Configurações</a>
            </li>

        </ul>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <h1>Editar Parte</h1>

        <form
        class="formulario"
        action="/atualizarparte/{{ parte.id }}"
        method="POST">

            <input
            type="text"
            name="nome"
            value="{{ parte.nome }}">

            <select name="tipo">

                <option
                {% if parte.tipo == 'Fornecedor' %}
                selected
                {% endif %}>
                Fornecedor
                </option>

                <option
                {% if parte.tipo == 'Cliente' %}
                selected
                {% endif %}>
                Cliente
                </option>

                <option
                {% if parte.tipo == 'Parceiro' %}
                selected
                {% endif %}>
                Parceiro
                </option>

            </select>

            <input
            type="text"
            name="documento"
            value="{{ parte.documento }}">

            <input
            type="text"
            name="contato"
            value="{{ parte.contato }}">

            <input
            type="email"
            name="email"
            value="{{ parte.email }}">

            <input
            type="text"
            name="telefone"
            value="{{ parte.telefone }}">

            <textarea
            name="endereco">{{ parte.endereco }}</textarea>

            <button
            type="submit"
            class="salvar">

                Salvar Alterações

            </button>

        </form>

        <a href="/partes">

            <button class="voltar">
                Voltar
            </button>

        </a>

    </div>

</body>

</html>
