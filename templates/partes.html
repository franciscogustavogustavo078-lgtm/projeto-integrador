<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Partes Contratantes</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='partes.css') }}">

</head>

<body>

    <!-- MENU -->
    <div class="menu">

        <h2>Contratos</h2>

        <ul>

            <li>
                <a href="/dashboard">Dashboard</a>
            </li>

            <li>
                <a href="/">Contratos</a>
            </li>

            <li>
                <a href="/partes">Partes</a>
            </li>

            <li>
                <a href="/relatorios">Relatórios</a>
            </li>

            <li>
                <a href="/config">Configurações</a>
            </li>

        </ul>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <h1>Partes Contratantes</h1>

        <a href="/cadpartes">

            <button class="novo">
                + Nova Parte
            </button>

        </a>

        <table>

            <thead>

                <tr>

                    <th>Nome</th>

                    <th>Tipo</th>

                    <th>Documento</th>

                    <th>Email</th>

                    <th>Telefone</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody>

                {% for parte in partes %}

                <tr>

                    <td>{{ parte.nome }}</td>

                    <td>{{ parte.tipo }}</td>

                    <td>{{ parte.documento }}</td>

                    <td>{{ parte.email }}</td>

                    <td>{{ parte.telefone }}</td>

                    <td>

                        <a href="/verparte/{{ parte.id }}">

                            <button class="acao">
                                Ver
                            </button>

                        </a>

                        <a href="/editarparte/{{ parte.id }}">

                            <button class="acao">
                                Editar
                            </button>

                        </a>

                        <a href="/excluirparte/{{ parte.id }}">

                            <button class="acao">
                                Excluir
                            </button>

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
