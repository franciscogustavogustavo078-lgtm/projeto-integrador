<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Novo Contrato</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='cadcontratos.css') }}">

</head>

<body>

    <!-- MENU -->
    <div class="menu">

        <h2>Contratos</h2>

        <ul>

            <li>
                <a href="/">Dashboard</a>
            </li>

            <li>
                <a href="/">Contratos</a>
            </li>

            <li>
                <a href="/partes">Partes</a>
            </li>

            <li>
                <a href="relatorios.html">Relatórios</a>
            </li>

            <li>
                <a href="config.html">Configurações</a>
            </li>

        </ul>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <h1>Novo Contrato</h1>

        <form
        class="formulario"
        action="/salvar"
        method="POST">

            <input
            type="text"
            name="numero"
            placeholder="Número do contrato"
            required>

            <select name="tipo">

                <option>
                    Tipo de contrato
                </option>

                <option>
                    Serviço
                </option>

                <option>
                    Parceria
                </option>

                <option>
                    Fornecimento
                </option>

            </select>

            <input
            type="text"
            name="parte"
            placeholder="Parte contratante">

            <textarea
            name="descricao"
            placeholder="Descrição"></textarea>

            <label>Data de Início</label>

            <input
            type="date"
            name="inicio">

            <label>Data de Fim</label>

            <input
            type="date"
            name="fim">

            <input
            type="number"
            name="valor"
            placeholder="Valor total">

            <select name="status">

                <option>
                    Status
                </option>

                <option>
                    Ativo
                </option>

                <option>
                    Vencido
                </option>

                <option>
                    Rescindido
                </option>

            </select>

            <button
            type="submit"
            class="salvar">

                Salvar Contrato

            </button>

        </form>

    </div>

</body>

</html>
