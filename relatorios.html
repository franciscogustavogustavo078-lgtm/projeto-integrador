<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatórios</title>
    <link rel="stylesheet" href="css/relatorios.css">
</head>
<body>

    <!-- MENU -->
    <div class="menu">
        <h2>Contratos</h2>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="contratos.html">Contratos</a></li>
            <li><a href="partes.html">Partes</a></li>
            <li><a href="relatorios.html">Relatórios</a></li>
            <li><a href="config.html">Configurações</a></li>
        </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <h1>Relatórios</h1>

        <!-- FILTROS -->
        <div class="filtros">
            <input type="date">
            <select>
                <option>Todos</option>
                <option>Ativo</option>
                <option>Vencido</option>
                <option>Rescindido</option>
            </select>
            <button class="buscar">Buscar</button>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Total de Contratos</h3>
                <p>25</p>
            </div>

            <div class="card">
                <h3>Valor Total</h3>
                <p>R$ 50.000</p>
            </div>

            <div class="card">
                <h3>Ativos</h3>
                <p>18</p>
            </div>
        </div>

        <!-- TABELA -->
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Tipo</th>
                    <th>Parte</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>001</td>
                    <td>Serviço</td>
                    <td>Empresa ABC</td>
                    <td>R$ 10.000</td>
                    <td>Ativo</td>
                </tr>

                <tr>
                    <td>002</td>
                    <td>Parceria</td>
                    <td>Empresa XYZ</td>
                    <td>R$ 5.000</td>
                    <td>Vencido</td>
                </tr>
            </tbody>
        </table>

    </div>

</body>
</html>
